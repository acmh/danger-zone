# Drop this at your repo root as `.danger-zone.conf` for a Node project.

trigger  node --interactive
trigger  npx prisma studio
trigger  npx prisma migrate deploy
trigger  npm run console

prod_env NODE_ENV
prod_env APP_ENV

marker   NODE_ENV=production

label    node --interactive        = PRODUCTION NODE REPL
label    npx prisma studio         = PRODUCTION PRISMA STUDIO
label    npx prisma migrate deploy = PRODUCTION MIGRATION
label    npm run console           = PRODUCTION CONSOLE
