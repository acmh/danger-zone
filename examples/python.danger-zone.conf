# Drop this at your repo root as `.danger-zone.conf` for a Python/Django project.
#
# Format: one directive per line. `#` starts a comment. Recognized directives:
#   trigger  <substring>                 append to DANGER_ZONE_TRIGGERS
#   prod_env <VAR>                       append to DANGER_ZONE_PROD_ENV_VARS
#   marker   <substring>                 append to DANGER_ZONE_PROD_COMMAND_MARKERS
#   label    <trigger> = <banner text>   map a trigger to a banner label
#   reset                                clear all four arrays (drop defaults)
#
# The file is PARSED, not sourced — no code execution.

trigger  python manage.py shell
trigger  ./manage.py shell
trigger  ./manage.py dbshell
trigger  flask shell

prod_env DJANGO_ENV
prod_env FLASK_ENV
prod_env APP_ENV

marker   DJANGO_SETTINGS_MODULE=config.settings.production

label    python manage.py shell = PRODUCTION DJANGO SHELL
label    ./manage.py shell      = PRODUCTION DJANGO SHELL
label    ./manage.py dbshell    = PRODUCTION DATABASE SHELL
label    flask shell            = PRODUCTION FLASK SHELL
